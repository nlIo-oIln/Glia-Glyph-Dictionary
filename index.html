<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emoji dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #000000;
    --surface:   #0d0d0d;
    --border:    #454545;
    --border-h:  #454545;
    --text:      #ffffff;
    --text-dim:  #999999;
    --accent:    #ffffff;
    --accent-dim:#454545;

    --v-badge:#62d8e6;
    --v-row:  #000000;

    --a-badge:#d64a87;
    --a-row:  #000000;

    --n-badge:#e0db4b;
    --n-row:  #000000;

    --header-h: 56px;
    --img-size:  96px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    line-height: 1.7;
  }

  /* ── ヘッダー ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--header-h);
    background: #000000ee;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 24px;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    letter-spacing: .15em;
    color: var(--accent);
    flex: 1;
  }

  header h1 span {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: .08em;
    margin-left: 12px;
  }

  #stats {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: .05em;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* ── フォルダ選択ボタン ── */
  .open-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: .2em;
    cursor: pointer;
    transition: background .25s, box-shadow .25s;
    text-transform: uppercase;
  }
  .open-btn:hover {
    background: #ffffff15;
    box-shadow: 0 0 24px #ffffff30;
  }

  #folder-input { display: none; }

  /* ── 凡例バッジ ── */
  .legend {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text-dim);
    letter-spacing: .05em;
  }
  .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .dot-v { background: var(--v-badge); }
  .dot-a { background: var(--a-badge); }
  .dot-n { background: var(--n-badge); }

  /* ── ローディング ── */
  #loading-zone {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    height: calc(100vh - var(--header-h));
    animation: fadeIn .4s ease;
  }
  #loading-zone.visible { display: flex; }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: .25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── 案内エリア（フォールバック） ── */
  #drop-zone {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: calc(100vh - var(--header-h));
    animation: fadeIn .6s ease;
  }
  #drop-zone.visible { display: flex; }

  #drop-zone .guide-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    letter-spacing: .2em;
    color: var(--text-dim);
  }

  #drop-zone .guide-sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    color: var(--accent-dim);
    letter-spacing: .08em;
  }

  /* ── エラーエリア ── */
  #error-zone {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: calc(100vh - var(--header-h));
    animation: fadeIn .4s ease;
  }
  #error-zone.visible { display: flex; }
  .error-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: #ff6b6b;
    letter-spacing: .08em;
  }
  .error-detail {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: .05em;
    max-width: 480px;
    text-align: center;
    line-height: 2;
  }

  /* ── テーブルラッパー（スクロールコンテナ） ── */
  #table-wrap {
    display: none;
    height: calc(100vh - var(--header-h));
    overflow: auto;
    animation: fadeIn .5s ease;
  }
  #table-wrap.visible { display: block; }

  #table-scroll {
    min-width: 900px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── テーブル本体 ── */
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    padding-bottom: 40px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: #050505;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .18em;
    color: var(--accent);
    text-transform: uppercase;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-h);
    white-space: nowrap;
    text-align: left;
    z-index: 10;
  }
  thead th:first-child { text-align: center; padding-left: 20px; }

  /* 行 */
  tbody tr { transition: background .15s; }
  tbody tr:hover td { filter: brightness(1.3); }

  tbody tr.type-v { background: var(--v-row); }
  tbody tr.type-a { background: var(--a-row); }
  tbody tr.type-n { background: var(--n-row); }

  tbody td {
    padding: 14px 16px;
    vertical-align: middle;
    border-bottom: 1px solid var(--border);
  }

  /* 収録番号セル */
  .td-num {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--text-dim);
    padding-left: 20px;
    min-width: 60px;
  }
  .num-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .type-badge {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: .1em;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .type-v .type-badge { background: #62d8e622; color: var(--v-badge); border: 1px solid #62d8e644; }
  .type-a .type-badge { background: #d64a8722; color: var(--a-badge); border: 1px solid #d64a8744; }
  .type-n .type-badge { background: #e0db4b22; color: var(--n-badge); border: 1px solid #e0db4b44; }

  /* 画像セル */
  .td-img {
    text-align: center;
    min-width: calc(var(--img-size) + 24px);
    padding: 10px 12px;
  }
  .char-img {
    width: var(--img-size);
    height: var(--img-size);
    object-fit: contain;
    border: 1px solid var(--border);
    background: #000000;
    display: block;
    image-rendering: auto;
    transition: transform .2s;
  }
  .char-img:hover {
    transform: scale(1.06);
    border-color: var(--border-h);
    cursor: zoom-in;
  }
  .img-placeholder {
    width: var(--img-size);
    height: var(--img-size);
    border: 1px dashed var(--border);
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border-h);
    font-size: 18px;
  }

  /* 意味・例文セル */
  .td-meaning, .td-example {
    min-width: 140px;
    max-width: 260px;
  }
  .td-example { max-width: 320px; }

  .type-dot {
    font-size: 10px;
    margin-right: 5px;
    vertical-align: middle;
    line-height: 1;
  }
  .meaning-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  .example-text {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    border-left: 2px solid var(--border-h);
    padding-left: 10px;
  }

  /* ── ライトボックス ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    backdrop-filter: blur(6px);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border: 1px solid var(--border-h);
    box-shadow: 0 0 60px #00000099;
    image-rendering: auto;
  }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>emoji dictionary<span>第一版</span></h1>
  <div class="legend">
    <div class="badge"><span class="badge-dot dot-v"></span>V</div>
    <div class="badge"><span class="badge-dot dot-a"></span>A</div>
    <div class="badge"><span class="badge-dot dot-n"></span>N</div>
  </div>
  <div id="stats"></div>
  <!-- フォールバック用（manifest.json がない場合 / ローカル開発用） -->
  <button class="open-btn" id="manual-btn" style="display:none"
          onclick="document.getElementById('folder-input').click()">
    𓁞 フォルダを選択
  </button>
  <input type="file" id="folder-input" webkitdirectory multiple>
</header>

<!-- ローディング -->
<div id="loading-zone" class="visible">
  <div class="loading-spinner"></div>
  <p class="loading-text">Loading</p>
</div>

<!-- 案内エリア（フォールバック） -->
<div id="drop-zone">
  <p class="guide-text">右上からフォルダを選択せよ</p>
  <p class="guide-sub">画像ファイル（[番号]p1 / [番号]p2）とテキストファイル（[番号]v/a/n）を自動で読み込みます</p>
</div>

<!-- エラーエリア -->
<div id="error-zone">
  <p class="error-text">読み込みに失敗しました</p>
  <p class="error-detail" id="error-detail"></p>
</div>

<!-- テーブル -->
<div id="table-wrap">
  <div id="table-scroll">
    <table id="jiten-table">
      <thead>
        <tr>
          <th>#</th>
          <th>文字１</th>
          <th>文字２</th>
          <th>字義１</th>
          <th>字義２</th>
          <th>例文</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- ライトボックス -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="">
</div>

<script>
// =========================================================
//  起動時：GitHub API でファイル一覧を自動取得
// =========================================================
window.addEventListener('DOMContentLoaded', function () {
  autoLoadFromGitHub();
});

// GitHub Pages の URL からオーナーとリポジトリ名を特定し、
// Contents API でファイル一覧を取得してテーブルを構築します。
//
// 対応 URL パターン:
//   https://{owner}.github.io/{repo}/   → プロジェクトページ（最も一般的）
//   https://{owner}.github.io/          → ユーザーページ（repo = owner.github.io）
//
// ローカルで直接 index.html を開いた場合は自動的にフォルダ選択へ切り替わります。
async function autoLoadFromGitHub() {
  var hostname = window.location.hostname; // 例: "username.github.io"
  var pathname = window.location.pathname; // 例: "/repo-name/"

  // GitHub Pages 以外（localhost など）は即フォールバック
  var hostParts = hostname.split('.');
  if (hostParts.length < 3 || hostParts[1] !== 'github' || hostParts[2] !== 'io') {
    showFallback(new Error('GitHub Pages 以外の環境'));
    return;
  }

  var owner = hostParts[0];

  // パスからリポジトリ名を特定
  var pathParts = pathname.replace(/^\/|\/$/g, '').split('/').filter(function(p){ return p; });
  var repo, dataPath;

  if (pathParts.length === 0) {
    // ユーザーページ (owner.github.io) → リポジトリ名は "owner.github.io"
    repo     = owner + '.github.io';
    dataPath = '';
  } else {
    // プロジェクトページ (owner.github.io/repo/) → 最初のパスセグメントがリポジトリ名
    repo     = pathParts[0];
    dataPath = pathParts.slice(1).join('/');
  }

  // GitHub Contents API を呼び出す
  var apiUrl = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + dataPath;

  try {
    var res = await fetch(apiUrl, {
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('GitHub API: HTTP ' + res.status + ' (' + apiUrl + ')');

    var items = await res.json();
    if (!Array.isArray(items)) throw new Error('GitHub API のレスポンスが不正です');

    // 対象ファイルだけ抽出（[番号]p1/p2.* と [番号]v/a/n.*）
    var validName = /^(\d+p[12]|\d+[van])\.(png|jpg|jpeg|gif|webp|svg|txt|text)$/i;
    var fileList = items
      .filter(function(item){ return item.type === 'file' && validName.test(item.name); })
      .map(function(item){ return item.download_url; }); // raw.githubusercontent.com の URL

    if (fileList.length === 0) {
      throw new Error('対象ファイルが見つかりません（命名規則: [番号]p1.png / [番号]v.txt など）');
    }

    await buildDictionaryFromURLs(fileList);

  } catch (err) {
    showFallback(err);
  }
}

// =========================================================
//  URL リストからテーブルを構築（GitHub Pages 用）
// =========================================================
async function buildDictionaryFromURLs(fileList) {
  var groups = {};

  for (var i = 0; i < fileList.length; i++) {
    var filePath = fileList[i];
    var rawName = filePath.split('/').pop();
    var dot = rawName.lastIndexOf('.');
    var base = dot !== -1 ? rawName.substring(0, dot) : rawName;

    var imgMatch = base.match(/^(\d+)p([12])$/);
    if (imgMatch) {
      var n = parseInt(imgMatch[1]);
      var k = 'p' + imgMatch[2];
      if (!groups[n]) groups[n] = {};
      groups[n][k] = filePath;   // URL パスを保持
      continue;
    }

    var txtMatch = base.match(/^(\d+)([van])$/i);
    if (txtMatch) {
      var n2 = parseInt(txtMatch[1]);
      if (!groups[n2]) groups[n2] = {};
      groups[n2].txtUrl = filePath;
      groups[n2].type   = txtMatch[2].toLowerCase();
      continue;
    }
  }

  var nums = Object.keys(groups).map(Number).sort(function(a, b){ return a - b; });
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (var j = 0; j < nums.length; j++) {
    tbody.appendChild(await buildRowFromURL(nums[j], groups[nums[j]]));
  }

  showTable(nums.length);
}

async function buildRowFromURL(num, g) {
  var type = g.type || '';
  var tr = document.createElement('tr');
  tr.className = type ? 'type-' + type : '';

  // 番号セル
  var tdNum = document.createElement('td');
  tdNum.className = 'td-num';
  tdNum.innerHTML =
    '<div class="num-inner"><span>' + num + '</span>' +
    (type ? '<span class="type-badge">' + type.toUpperCase() + '</span>' : '') +
    '</div>';
  tr.appendChild(tdNum);

  // 画像セル（URL を直接 src に設定）
  tr.appendChild(makeImgCellFromURL(g.p1));
  tr.appendChild(makeImgCellFromURL(g.p2));

  // テキストセル
  var meaning1 = '—', meaning2 = '—', example = '—';
  if (g.txtUrl) {
    try {
      var res = await fetch(g.txtUrl);
      if (!res.ok) throw new Error('');
      var text = await res.text();
      var lines = text.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l; });
      meaning1 = lines[0] || '—';
      meaning2 = lines[1] || '—';
      example  = lines.slice(2).join('\n') || '—';
    } catch(e) {
      meaning1 = '(読み込みエラー)';
    }
  }

  var dotColor = type === 'v' ? 'var(--v-badge)' :
                 type === 'a' ? 'var(--a-badge)' :
                 type === 'n' ? 'var(--n-badge)' : 'var(--text-dim)';

  var td3 = document.createElement('td');
  td3.className = 'td-meaning';
  td3.innerHTML = '<span class="meaning-text"><span class="type-dot" style="color:' + dotColor + '">●</span>' + esc(meaning1) + '</span>';
  tr.appendChild(td3);

  var td4 = document.createElement('td');
  td4.className = 'td-meaning';
  td4.innerHTML = '<span class="meaning-text">' + esc(meaning2) + '</span>';
  tr.appendChild(td4);

  var td5 = document.createElement('td');
  td5.className = 'td-example';
  td5.innerHTML = '<span class="example-text">' + esc(example).replace(/\n/g,'<br>') + '</span>';
  tr.appendChild(td5);

  return tr;
}

function makeImgCellFromURL(url) {
  var td = document.createElement('td');
  td.className = 'td-img';
  if (url) {
    var img = document.createElement('img');
    img.className = 'char-img';
    img.src = url;
    img.alt = url.split('/').pop();
    img.title = '拡大';
    img.addEventListener('click', (function(u){ return function(){ openLightbox(u); }; })(url));
    td.appendChild(img);
  } else {
    td.innerHTML = '<div class="img-placeholder">―</div>';
  }
  return td;
}

// =========================================================
//  フォールバック：フォルダ選択（ローカル開発 / GitHub Pages 以外）
// =========================================================
function showFallback(err) {
  hide('loading-zone');
  show('drop-zone');
  document.getElementById('manual-btn').style.display = 'inline-flex';
  console.warn('[emoji-dict] GitHub API での自動読み込みができませんでした。フォルダ選択モードに切り替えます。', err);
}

document.getElementById('folder-input').addEventListener('change', async function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  hide('drop-zone');
  show('loading-zone');
  await buildDictionaryFromFiles(files);
});

async function buildDictionaryFromFiles(files) {
  var groups = {};

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var rawName = file.name;
    var dot = rawName.lastIndexOf('.');
    var base = dot !== -1 ? rawName.substring(0, dot) : rawName;

    var imgMatch = base.match(/^(\d+)p([12])$/);
    if (imgMatch) {
      var n = parseInt(imgMatch[1]);
      var k = 'p' + imgMatch[2];
      if (!groups[n]) groups[n] = {};
      groups[n][k] = file;
      continue;
    }

    var txtMatch = base.match(/^(\d+)([van])$/i);
    if (txtMatch) {
      var n2 = parseInt(txtMatch[1]);
      if (!groups[n2]) groups[n2] = {};
      groups[n2].txt  = file;
      groups[n2].type = txtMatch[2].toLowerCase();
      continue;
    }
  }

  var nums = Object.keys(groups).map(Number).sort(function(a, b){ return a - b; });
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (var j = 0; j < nums.length; j++) {
    tbody.appendChild(await buildRowFromFile(nums[j], groups[nums[j]]));
  }

  showTable(nums.length);
}

async function buildRowFromFile(num, g) {
  var type = g.type || '';
  var tr = document.createElement('tr');
  tr.className = type ? 'type-' + type : '';

  var tdNum = document.createElement('td');
  tdNum.className = 'td-num';
  tdNum.innerHTML =
    '<div class="num-inner"><span>' + num + '</span>' +
    (type ? '<span class="type-badge">' + type.toUpperCase() + '</span>' : '') +
    '</div>';
  tr.appendChild(tdNum);

  tr.appendChild(makeImgCellFromFile(g.p1));
  tr.appendChild(makeImgCellFromFile(g.p2));

  var meaning1 = '—', meaning2 = '—', example = '—';
  if (g.txt) {
    try {
      var text = await readText(g.txt);
      var lines = text.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l; });
      meaning1 = lines[0] || '—';
      meaning2 = lines[1] || '—';
      example  = lines.slice(2).join('\n') || '—';
    } catch(err) {
      meaning1 = '(読み込みエラー)';
    }
  }

  var dotColor = type === 'v' ? 'var(--v-badge)' :
                 type === 'a' ? 'var(--a-badge)' :
                 type === 'n' ? 'var(--n-badge)' : 'var(--text-dim)';

  var td3 = document.createElement('td');
  td3.className = 'td-meaning';
  td3.innerHTML = '<span class="meaning-text"><span class="type-dot" style="color:' + dotColor + '">●</span>' + esc(meaning1) + '</span>';
  tr.appendChild(td3);

  var td4 = document.createElement('td');
  td4.className = 'td-meaning';
  td4.innerHTML = '<span class="meaning-text">' + esc(meaning2) + '</span>';
  tr.appendChild(td4);

  var td5 = document.createElement('td');
  td5.className = 'td-example';
  td5.innerHTML = '<span class="example-text">' + esc(example).replace(/\n/g,'<br>') + '</span>';
  tr.appendChild(td5);

  return tr;
}

function makeImgCellFromFile(file) {
  var td = document.createElement('td');
  td.className = 'td-img';
  if (file) {
    var url = URL.createObjectURL(file);
    var img = document.createElement('img');
    img.className = 'char-img';
    img.src = url;
    img.alt = file.name;
    img.title = '拡大';
    img.addEventListener('click', (function(u){ return function(){ openLightbox(u); }; })(url));
    td.appendChild(img);
  } else {
    td.innerHTML = '<div class="img-placeholder">―</div>';
  }
  return td;
}

function readText(file) {
  return new Promise(function(res, rej) {
    var reader = new FileReader();
    reader.onload  = function(e){ res(e.target.result); };
    reader.onerror = rej;
    reader.readAsText(file, 'UTF-8');
  });
}

// =========================================================
//  共通ユーティリティ
// =========================================================
function showTable(count) {
  hide('loading-zone');
  hide('drop-zone');
  hide('error-zone');
  show('table-wrap');
  document.getElementById('stats').textContent = count + ' 項目';
  document.getElementById('table-wrap').scrollTop = 0;
}

function show(id) { document.getElementById(id).classList.add('visible'); }
function hide(id) { document.getElementById(id).classList.remove('visible'); }

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeLightbox();
});
</script>
